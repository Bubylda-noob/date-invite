<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свидание 🌸</title>
    <style>
        :root {
            --pink-bg: #fff0f5;
            --pink-main: #ff69b4;
            --pink-dark: #ff1493;
            --pink-light: #ffe4e1;
            --text-color: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--pink-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
            text-align: center;
            max-width: 400px;
            width: 100%;
            height: 400px; /* Фиксированная высота, чтобы было место бегать */
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .card.active {
            display: flex;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--text-color);
            line-height: 1.4;
        }

        .btn {
            background-color: var(--pink-main);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
            z-index: 5;
        }

        .btn:hover {
            background-color: var(--pink-dark);
        }

        /* --- Контейнер для кнопок на первом экране --- */
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100px;
            position: relative;
        }

        #btn-no {
            background-color: #f0f0f0;
            color: #666;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.1s ease-out;
        }

        /* Класс, который сделает кнопку летающей по всей карточке */
        #btn-no.runaway {
            position: absolute;
            z-index: 99;
        }

        /* --- ЭКРАН 2: Поля ввода --- */
        .input-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #777;
        }

        input[type="date"], input[type="time"] {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--pink-light);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            color: var(--text-color);
        }

        input:focus {
            border-color: var(--pink-main);
        }

        /* --- ЭКРАН 3: Еда --- */
        .food-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        .food-option {
            background: #fff;
            border: 2px solid var(--pink-light);
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }

        .food-option:hover {
            background-color: var(--pink-light);
        }

        .food-option.selected {
[13.07.2026 17:24] Данюлька😮‍💨: border-color: var(--pink-main);
            background-color: #fff0f5;
            font-weight: bold;
        }

        .food-emoji {
            font-size: 28px;
            display: block;
            margin-bottom: 30px;
            margin: 0 auto 5px auto;
        }

        /* --- Финал --- */
        .summary-box {
            background: var(--pink-bg);
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            margin: 20px 0;
            text-align: left;
        }

        .summary-item {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .footnote {
            font-size: 11px;
            color: #aaa;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 1 -->
    <div class="card active" id="step-1">
        <h2>🌸 Пойдешь со мной на свидание? 🌸</h2>
        <div class="btn-container">
            <button class="btn" id="btn-yes">ДА! ❤️</button>
            <button class="btn" id="btn-no">Нет 😢</button>
        </div>
    </div>

    <!-- ЭКРАН 2 -->
    <div class="card" id="step-2">
        <h2>Итак... когда ты свободна? 📅🐾</h2>
        <div class="input-group">
            <label>Выбери день:</label>
            <input type="date" id="date-picker">
        </div>
        <div class="input-group">
            <label>Выбери время:</label>
            <input type="time" id="time-picker">
        </div>
        <button class="btn" id="btn-to-step3" style="margin-top: 15px;">Далее 💖</button>
    </div>

    <!-- ЭКРАН 3 -->
    <div class="card" id="step-3">
        <h2>Что мы будем кушать? 🍕✨</h2>
        <div class="food-grid">
            <div class="food-option" data-food="Пицца"><span class="food-emoji">🍕</span>Пицца</div>
            <div class="food-option" data-food="Суши"><span class="food-emoji">🍣</span>Суши</div>
            <div class="food-option" data-food="Бургеры"><span class="food-emoji">🍔</span>Бургеры</div>
            <div class="food-option" data-food="Паста"><span class="food-emoji">🍝</span>Паста</div>
            <div class="food-option" data-food="Тако"><span class="food-emoji">🌮</span>Тако</div>
            <div class="food-option" data-food="Рамен"><span class="food-emoji">🍜</span>Рамен</div>
        </div>
        <button class="btn" id="btn-to-step4" disabled style="opacity: 0.5; width: 100%;">Готово 💕</button>
    </div>

    <!-- ЭКРАН 4 -->
    <div class="card" id="step-4">
        <h2>УРА!! 🎉💖</h2>
        <div class="summary-box">
            <div class="summary-item">📅 <strong>Дата:</strong> <span id="summary-date"></span></div>
            <div class="summary-item">⏰ <strong>Время:</strong> <span id="summary-time"></span></div>
            <div class="summary-item">🍽️ <strong>Еда:</strong> <span id="summary-food"></span></div>
        </div>
        <h3>Я уже не могу дождаться! 🌹✨</h3>
        <p class="footnote">(обычные парни пишут смс, а крутые программисты создают сайты 😉)</p>
    </div>

    <script>
        let selectedDate = "";
        let selectedTime = "";
        let selectedFood = "";

        function navigate(from, to) {
            document.getElementById(from).classList.remove('active');
            document.getElementById(to).classList.add('active');
        }

        // --- НАДЕЖНОЕ УБЕГАНИЕ КНОПКИ НА ЭКРАНЕ 1 ---
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const card1 = document.getElementById('step-1');

        function moveButton() {
            if (!btnNo.classList.contains('runaway')) {
                btnNo.classList.add('runaway');
            }

            // Кнопка будет летать абсолютно по всей белой карточке
            // Вычисляем доступные границы внутри карточки, учитывая размеры кнопки
            const maxX = card1.clientWidth - btnNo.clientWidth - 40;
            const maxY = card1.clientHeight - btnNo.clientHeight - 40;

            const randomX = Math.floor(Math.random() * maxX) + 20;
[13.07.2026 17:24] Данюлька😮‍💨: const randomY = Math.floor(Math.random() * maxY) + 20;

            // Прижимаем её к новым координатам относительно карточки
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // Убегает при наведении мыши и при таче с телефона
        btnNo.addEventListener('mouseenter', moveButton);
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); // отменяем обычный клик на смартфонах
            moveButton();
        });

        // Клик по кнопке ДА — железно переключает экран
        btnYes.addEventListener('click', () => {
            navigate('step-1', 'step-2');
        });

        // --- ЛОГИКА ЭКРАНА 2 ---
        document.getElementById('btn-to-step3').addEventListener('click', () => {
            const dateInput = document.getElementById('date-picker').value;
            const timeInput = document.getElementById('time-picker').value;

            if (!dateInput || !timeInput) {
                alert("Пожалуйста, выбери дату и время! ✍️");
                return;
            }

            const dateObj = new Date(dateInput);
            let formattedDate = dateObj.toLocaleDateString('ru-RU', { weekday: 'long', month: 'long', day: 'numeric' });
            selectedDate = formattedDate.charAt(0).toUpperCase() + formattedDate.slice(1);
            selectedTime = timeInput;

            navigate('step-2', 'step-3');
        });

        // --- ЛОГИКА ЭКРАНА 3 ---
        const foodOptions = document.querySelectorAll('.food-option');
        const btnToStep4 = document.getElementById('btn-to-step4');

        foodOptions.forEach(option => {
            option.addEventListener('click', () => {
                foodOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                
                selectedFood = option.getAttribute('data-food');
                btnToStep4.disabled = false;
                btnToStep4.style.opacity = "1";
            });
        });

        document.getElementById('btn-to-step4').addEventListener('click', () => {
            document.getElementById('summary-date').innerText = selectedDate;
            document.getElementById('summary-time').innerText = selectedTime;
            document.getElementById('summary-food').innerText = selectedFood;

            navigate('step-3', 'step-4');
        });
    </script>
</body>
</html>
